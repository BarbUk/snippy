name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: read
jobs:
  release:
    name: Create Release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Update version in file
        run: |
          echo "updating version with: ${GITHUB_REF_NAME}"
          sed --in-place --regexp-extended --expression "s/(readonly version=).*$/\1${GITHUB_REF_NAME}/" snippy
      - name: Create Release
        run: |
          gh release create --generate-notes --verify-tag "v${GITHUB_REF_NAME}" snippy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  aur-publish:
    name: Publish release
    needs: release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: AUR package publisher
        uses: BarbUk/aur-publish-docker-action@5940ebc79b6f8ea7bddb2c5ed15d8c0d96396fa9 # v1.0.7
        with:
          package_name: snippy-snippet
          commit_username: 'BarbUk'
          commit_email: ${{ secrets.AUR_SSH_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
